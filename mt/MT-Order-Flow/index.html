<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MT Order Flow</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-bs-theme="light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container">
        <a
          class="navbar-brand d-flex align-items-center"
          href="#"
          id="nav-logo"
        >
          <i class="bi bi-diagram-3-fill me-2"></i>
          MT Order Flow
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="#" data-page="products">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" data-page="orders">Orders</a>
            </li>
          </ul>
          <div class="d-flex align-items-center">
            <div id="theme-toggle" class="theme-toggle text-light me-3">
              <i class="bi bi-moon-stars-fill"></i>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="container">
      <!-- Product Listing Page -->
      <section id="page-products" class="page">
        <div class="row mb-4 align-items-center">
          <div class="col-md-6">
            <h2>Product Catalog</h2>
          </div>
          <div class="col-md-6">
            <div class="input-group">
              <span class="input-group-text bg-transparent"
                ><i class="bi bi-search"></i
              ></span>
              <input
                type="text"
                id="product-search"
                class="form-control"
                placeholder="Search products..."
              />
            </div>
          </div>
        </div>
        <div id="product-list" class="row g-4">
          <!-- Products injected here -->
        </div>
      </section>

      <!-- Order Listing Page -->
      <section id="page-orders" class="page">
        <div class="row mb-4">
          <div class="col-md-4">
            <h2>Orders</h2>
          </div>
          <div class="col-md-8">
            <div class="row g-2">
              <div class="col">
                <input
                  type="date"
                  id="filter-date-start"
                  class="form-control"
                  placeholder="Start Date"
                />
              </div>
              <div class="col">
                <input
                  type="date"
                  id="filter-date-end"
                  class="form-control"
                  placeholder="End Date"
                />
              </div>
              <div class="col">
                <select id="filter-status" class="form-select">
                  <option value="">All Statuses</option>
                  <option value="Order Placed">Order Placed</option>
                  <option value="Processing">Processing</option>
                  <option value="Shipped">Shipped</option>
                  <option value="Delivered">Delivered</option>
                  <option value="Payment Failed">Payment Failed</option>
                  <option value="Returned">Returned</option>
                  <option value="Completed">Completed</option>
                  <option value="Cancelled">Cancelled</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="card shadow-sm">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Order ID</th>
                  <th>Product</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="order-list">
                <!-- Orders injected here -->
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Order Details Page -->
      <section id="page-order-details" class="page">
        <div class="row mb-4">
          <div class="col-md-8">
            <button
              class="btn btn-outline-secondary btn-sm mb-3"
              data-page="orders"
            >
              <i class="bi bi-arrow-left"></i> Back to Orders
            </button>
            <h2 id="detail-order-id">Order #---</h2>
          </div>
        </div>

        <div class="row">
          <div class="col-lg-8">
            <div class="card mb-4">
              <div class="card-header bg-transparent py-3">
                <h5 class="mb-0">Workflow Visualization</h5>
              </div>
              <div class="card-body">
                <div id="workflow-viz"></div>
                <div class="d-flex flex-wrap gap-2 mt-3" id="workflow-actions">
                  <!-- Action buttons injected here -->
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card">
              <div class="card-header bg-transparent py-3">
                <h5 class="mb-0">Order Summary</h5>
              </div>
              <div class="card-body" id="detail-summary">
                <!-- Summary details -->
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Modal for Purchase -->
    <div class="modal fade" id="purchaseModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Confirm Purchase</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p id="purchase-product-name"></p>
            <p class="text-muted" id="purchase-product-desc"></p>
            <div class="mb-3">
              <label class="form-label">Quantity</label>
              <input
                type="number"
                id="purchase-qty"
                class="form-control"
                value="1"
                min="1"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              id="confirm-purchase-btn"
              class="btn btn-primary"
            >
              Place Order
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div
        id="appToast"
        class="toast"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="toast-header">
          <i class="bi bi-info-circle me-2"></i>
          <strong class="me-auto">Notification</strong>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>
        </div>
        <div class="toast-body" id="toast-message"></div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
