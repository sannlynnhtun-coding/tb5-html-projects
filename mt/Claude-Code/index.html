<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0f9ff', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none; }
    .tr-selected { background-color: #e0f2fe !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20 7l-8-4-8 4m16 0v10l-8 4m0-10L4 7m8 10V7" />
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900">Inventory Manager</h1>
      </div>
      <button id="btn-add"
        class="inline-flex items-center gap-2 bg-brand-500 hover:bg-brand-600 active:bg-brand-700
               text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add Product
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-7xl mx-auto px-6 py-8 space-y-6">

    <!-- Stats bar -->
    <div id="stats-bar" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>

    <!-- Search + filter -->
    <div class="flex flex-col sm:flex-row gap-3">
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
        <input id="search" type="text" placeholder="Search by name, description or location…"
          class="w-full pl-9 pr-4 py-2 text-sm border border-gray-300 rounded-lg
                 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" />
      </div>
      <select id="filter-location"
        class="text-sm border border-gray-300 rounded-lg px-3 py-2
               focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-white">
        <option value="">All Locations</option>
      </select>
    </div>

    <!-- Table + Details layout -->
    <div class="flex flex-col xl:flex-row gap-6">

      <!-- Product Table -->
      <div class="flex-1 bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-200 text-left">
                <th class="px-4 py-3 font-semibold text-gray-600 w-20">ID</th>
                <th class="px-4 py-3 font-semibold text-gray-600">Name</th>
                <th class="px-4 py-3 font-semibold text-gray-600 hidden md:table-cell">Location</th>
                <th class="px-4 py-3 font-semibold text-gray-600 text-right w-24">Qty</th>
                <th class="px-4 py-3 font-semibold text-gray-600 text-center w-28">Actions</th>
              </tr>
            </thead>
            <tbody id="product-tbody">
              <!-- rows injected by JS -->
            </tbody>
          </table>
        </div>
        <div id="empty-state" class="hidden py-16 text-center text-gray-400">
          <svg class="w-12 h-12 mx-auto mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M20 13V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6m16 0v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6
                 m16 0H4m8-9v4m0 0-2-2m2 2 2-2" />
          </svg>
          <p class="font-medium">No products found</p>
          <p class="text-xs mt-1">Add your first product or adjust your search.</p>
        </div>
        <!-- Pagination -->
        <div id="pagination" class="flex items-center justify-between px-4 py-3 border-t border-gray-100 text-xs text-gray-500">
          <span id="page-info"></span>
          <div class="flex gap-1">
            <button id="btn-prev"
              class="px-3 py-1 rounded border border-gray-200 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
              ‹ Prev
            </button>
            <button id="btn-next"
              class="px-3 py-1 rounded border border-gray-200 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
              Next ›
            </button>
          </div>
        </div>
      </div>

      <!-- Product Details Panel -->
      <div id="details-panel"
        class="hidden xl:w-80 bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4 self-start">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold text-gray-900">Product Details</h2>
          <button id="btn-close-details" class="text-gray-400 hover:text-gray-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="h-px bg-gray-100"></div>
        <dl class="space-y-3 text-sm" id="details-body">
          <!-- filled by JS -->
        </dl>
        <div class="h-px bg-gray-100"></div>
        <div class="flex gap-2">
          <button id="details-edit"
            class="flex-1 text-sm font-medium bg-brand-500 hover:bg-brand-600 text-white py-2 rounded-lg transition-colors">
            Edit
          </button>
          <button id="details-delete"
            class="flex-1 text-sm font-medium bg-red-50 hover:bg-red-100 text-red-600 py-2 rounded-lg transition-colors">
            Delete
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- ───────────── Modal ───────────── -->
  <div id="modal-overlay"
    class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg">
      <!-- Modal header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h3 id="modal-title" class="text-lg font-semibold text-gray-900">Add Product</h3>
        <button id="modal-close" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <!-- Modal body -->
      <form id="product-form" class="px-6 py-5 space-y-4" novalidate>
        <input type="hidden" id="field-id" />

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide" for="field-name">Name</label>
          <input id="field-name" type="text" placeholder="e.g. Widget A"
            class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" />
          <p id="err-name" class="hidden text-xs text-red-500 mt-1">Name is required.</p>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide" for="field-description">Description</label>
          <textarea id="field-description" rows="3" placeholder="Brief product description…"
            class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 resize-none
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide" for="field-quantity">Quantity</label>
            <input id="field-quantity" type="number" min="0" placeholder="0"
              class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2
                     focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" />
            <p id="err-quantity" class="hidden text-xs text-red-500 mt-1">Enter a valid quantity (≥ 0).</p>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide" for="field-location">Location</label>
            <input id="field-location" type="text" placeholder="e.g. Warehouse B"
              class="w-full text-sm border border-gray-300 rounded-lg px-3 py-2
                     focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" />
            <p id="err-location" class="hidden text-xs text-red-500 mt-1">Location is required.</p>
          </div>
        </div>
      </form>
      <!-- Modal footer -->
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100 bg-gray-50 rounded-b-2xl">
        <button id="btn-cancel"
          class="text-sm font-medium px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors">
          Cancel
        </button>
        <button id="btn-save"
          class="text-sm font-medium px-5 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white transition-colors">
          Save Product
        </button>
      </div>
    </div>
  </div>

  <!-- ───────────── Delete Confirm ───────────── -->
  <div id="delete-overlay"
    class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 space-y-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0
                 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          </svg>
        </div>
        <div>
          <h3 class="font-semibold text-gray-900">Delete Product</h3>
          <p class="text-sm text-gray-500">This action cannot be undone.</p>
        </div>
      </div>
      <p class="text-sm text-gray-700">Are you sure you want to delete <strong id="delete-name"></strong>?</p>
      <div class="flex gap-3 justify-end">
        <button id="btn-delete-cancel"
          class="text-sm font-medium px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors">
          Cancel
        </button>
        <button id="btn-delete-confirm"
          class="text-sm font-medium px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white transition-colors">
          Delete
        </button>
      </div>
    </div>
  </div>

  <!-- ───────────── Toast ───────────── -->
  <div id="toast"
    class="hidden fixed bottom-6 right-6 bg-gray-900 text-white text-sm px-4 py-3 rounded-xl shadow-lg
           flex items-center gap-2 z-50 transition-all">
    <svg class="w-4 h-4 text-green-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
    </svg>
    <span id="toast-msg"></span>
  </div>

  <!-- ───────────── App Script ───────────── -->
  <script>
  $(function () {

    /* ── Storage ── */
    const STORAGE_KEY = 'inventory_products';
    let products = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let nextId = products.length ? Math.max(...products.map(p => p.id)) + 1 : 1;

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    }

    /* ── State ── */
    let currentPage = 1;
    const PAGE_SIZE  = 10;
    let selectedId   = null;
    let pendingDeleteId = null;

    /* ── Toast ── */
    let toastTimer;
    function toast(msg) {
      clearTimeout(toastTimer);
      $('#toast-msg').text(msg);
      $('#toast').removeClass('hidden');
      toastTimer = setTimeout(() => $('#toast').addClass('hidden'), 2500);
    }

    /* ── Stats ── */
    function renderStats() {
      const total = products.length;
      const totalQty = products.reduce((s, p) => s + Number(p.quantity), 0);
      const locations = new Set(products.map(p => p.location)).size;
      const lowStock  = products.filter(p => Number(p.quantity) < 5).length;

      const cards = [
        { label: 'Total Products', value: total,    color: 'text-brand-500' },
        { label: 'Total Quantity', value: totalQty, color: 'text-green-500' },
        { label: 'Locations',      value: locations, color: 'text-purple-500' },
        { label: 'Low Stock',      value: lowStock,  color: 'text-orange-500' },
      ];

      $('#stats-bar').html(cards.map(c => `
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-4">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">${c.label}</p>
          <p class="text-2xl font-bold mt-1 ${c.color}">${c.value}</p>
        </div>
      `).join(''));
    }

    /* ── Location filter options ── */
    function renderLocationFilter() {
      const current = $('#filter-location').val();
      const locs = [...new Set(products.map(p => p.location).filter(Boolean))].sort();
      $('#filter-location').html(
        '<option value="">All Locations</option>' +
        locs.map(l => `<option value="${l}" ${l === current ? 'selected' : ''}>${l}</option>`).join('')
      );
    }

    /* ── Filtered + paged data ── */
    function getFiltered() {
      const q    = $('#search').val().toLowerCase().trim();
      const loc  = $('#filter-location').val();
      return products.filter(p => {
        const matchQ = !q ||
          p.name.toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q) ||
          p.location.toLowerCase().includes(q);
        const matchL = !loc || p.location === loc;
        return matchQ && matchL;
      });
    }

    /* ── Qty badge ── */
    function qtyBadge(qty) {
      const n = Number(qty);
      if (n === 0) return `<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-red-100 text-red-600 font-semibold">${n}</span>`;
      if (n < 5)   return `<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-orange-100 text-orange-600 font-semibold">${n}</span>`;
      return `<span class="inline-block px-2 py-0.5 text-xs rounded-full bg-green-100 text-green-600 font-semibold">${n}</span>`;
    }

    /* ── Table render ── */
    function renderTable() {
      const filtered = getFiltered();
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;

      const paged = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

      if (filtered.length === 0) {
        $('#product-tbody').html('');
        $('#empty-state').removeClass('hidden');
        $('#pagination').addClass('hidden');
      } else {
        $('#empty-state').addClass('hidden');
        $('#pagination').removeClass('hidden');

        $('#product-tbody').html(paged.map(p => `
          <tr data-id="${p.id}" class="border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors
               ${p.id === selectedId ? 'tr-selected' : ''}">
            <td class="px-4 py-3 font-mono text-xs text-gray-400">#${String(p.id).padStart(4,'0')}</td>
            <td class="px-4 py-3">
              <p class="font-medium text-gray-900">${escHtml(p.name)}</p>
              <p class="text-xs text-gray-400 truncate max-w-xs">${escHtml(p.description || '—')}</p>
            </td>
            <td class="px-4 py-3 text-gray-600 hidden md:table-cell">${escHtml(p.location)}</td>
            <td class="px-4 py-3 text-right">${qtyBadge(p.quantity)}</td>
            <td class="px-4 py-3">
              <div class="flex items-center justify-center gap-1">
                <button class="btn-edit p-1.5 rounded-lg hover:bg-brand-50 text-gray-400 hover:text-brand-500 transition-colors" data-id="${p.id}" title="Edit">
                  <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0
                         2-2v-5m-1.414-9.414a2 2 0 1 1 2.828 2.828L11.828
                         15H9v-2.828l8.586-8.586z" />
                  </svg>
                </button>
                <button class="btn-delete p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500 transition-colors" data-id="${p.id}" title="Delete">
                  <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5
                         7m5 4v6m4-6v6m1-10V4a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v3M4 7h16" />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        `).join(''));
      }

      // Pagination controls
      const start = filtered.length === 0 ? 0 : (currentPage - 1) * PAGE_SIZE + 1;
      const end   = Math.min(currentPage * PAGE_SIZE, filtered.length);
      $('#page-info').text(`Showing ${start}–${end} of ${filtered.length}`);
      $('#btn-prev').prop('disabled', currentPage === 1);
      $('#btn-next').prop('disabled', currentPage === totalPages);

      renderStats();
      renderLocationFilter();
    }

    /* ── Details panel ── */
    function renderDetails(id) {
      const p = products.find(p => p.id === id);
      if (!p) { hideDetails(); return; }
      selectedId = id;

      $('#details-body').html(`
        ${detailRow('ID',          '#' + String(p.id).padStart(4,'0'))}
        ${detailRow('Name',        escHtml(p.name))}
        ${detailRow('Description', escHtml(p.description || '—'))}
        ${detailRow('Quantity',    qtyBadge(p.quantity))}
        ${detailRow('Location',    escHtml(p.location))}
      `);
      $('#details-edit, #details-delete').data('id', id);
      $('#details-panel').removeClass('hidden');
      renderTable();
    }

    function detailRow(label, value) {
      return `<div class="flex flex-col gap-0.5">
        <dt class="text-xs font-semibold uppercase tracking-wide text-gray-400">${label}</dt>
        <dd class="text-gray-800">${value}</dd>
      </div>`;
    }

    function hideDetails() {
      selectedId = null;
      $('#details-panel').addClass('hidden');
      renderTable();
    }

    /* ── Modal helpers ── */
    function openModal(product) {
      clearErrors();
      if (product) {
        $('#modal-title').text('Edit Product');
        $('#field-id').val(product.id);
        $('#field-name').val(product.name);
        $('#field-description').val(product.description || '');
        $('#field-quantity').val(product.quantity);
        $('#field-location').val(product.location);
      } else {
        $('#modal-title').text('Add Product');
        $('#product-form')[0].reset();
        $('#field-id').val('');
      }
      $('#modal-overlay').removeClass('hidden');
      setTimeout(() => $('#field-name').focus(), 50);
    }

    function closeModal() { $('#modal-overlay').addClass('hidden'); }

    function clearErrors() {
      $('#err-name, #err-quantity, #err-location').addClass('hidden');
      $('#field-name, #field-quantity, #field-location').removeClass('border-red-400');
    }

    function validate() {
      let ok = true;
      clearErrors();
      if (!$('#field-name').val().trim()) {
        $('#err-name').removeClass('hidden'); $('#field-name').addClass('border-red-400'); ok = false;
      }
      const qty = $('#field-quantity').val();
      if (qty === '' || isNaN(qty) || Number(qty) < 0) {
        $('#err-quantity').removeClass('hidden'); $('#field-quantity').addClass('border-red-400'); ok = false;
      }
      if (!$('#field-location').val().trim()) {
        $('#err-location').removeClass('hidden'); $('#field-location').addClass('border-red-400'); ok = false;
      }
      return ok;
    }

    /* ── Escape HTML ── */
    function escHtml(str) {
      return $('<div>').text(str).html();
    }

    /* ── Event: Add button ── */
    $('#btn-add').on('click', () => openModal(null));

    /* ── Event: Modal close/cancel ── */
    $('#modal-close, #btn-cancel').on('click', closeModal);
    $('#modal-overlay').on('click', function (e) {
      if (e.target === this) closeModal();
    });

    /* ── Event: Save form ── */
    $('#btn-save').on('click', function () {
      if (!validate()) return;
      const id   = $('#field-id').val();
      const data = {
        name:        $('#field-name').val().trim(),
        description: $('#field-description').val().trim(),
        quantity:    Number($('#field-quantity').val()),
        location:    $('#field-location').val().trim(),
      };

      if (id) {
        const idx = products.findIndex(p => p.id === Number(id));
        if (idx > -1) { products[idx] = { id: Number(id), ...data }; }
        toast('Product updated.');
        if (selectedId === Number(id)) renderDetails(Number(id));
      } else {
        products.push({ id: nextId++, ...data });
        toast('Product added.');
      }
      save();
      closeModal();
      renderTable();
    });

    /* ── Event: Row click → details ── */
    $('#product-tbody').on('click', 'tr', function (e) {
      if ($(e.target).closest('button').length) return;
      const id = Number($(this).data('id'));
      if (selectedId === id) { hideDetails(); } else { renderDetails(id); }
    });

    /* ── Event: Edit button ── */
    $('#product-tbody').on('click', '.btn-edit', function (e) {
      e.stopPropagation();
      const id = Number($(this).data('id'));
      openModal(products.find(p => p.id === id));
    });
    $('#details-edit').on('click', function () {
      openModal(products.find(p => p.id === Number($(this).data('id'))));
    });

    /* ── Event: Delete button ── */
    function confirmDelete(id) {
      const p = products.find(p => p.id === id);
      if (!p) return;
      pendingDeleteId = id;
      $('#delete-name').text(p.name);
      $('#delete-overlay').removeClass('hidden');
    }

    $('#product-tbody').on('click', '.btn-delete', function (e) {
      e.stopPropagation();
      confirmDelete(Number($(this).data('id')));
    });
    $('#details-delete').on('click', function () {
      confirmDelete(Number($(this).data('id')));
    });

    $('#btn-delete-cancel').on('click', () => {
      pendingDeleteId = null;
      $('#delete-overlay').addClass('hidden');
    });
    $('#delete-overlay').on('click', function (e) {
      if (e.target === this) { pendingDeleteId = null; $('#delete-overlay').addClass('hidden'); }
    });

    $('#btn-delete-confirm').on('click', function () {
      if (!pendingDeleteId) return;
      products = products.filter(p => p.id !== pendingDeleteId);
      save();
      if (selectedId === pendingDeleteId) hideDetails();
      pendingDeleteId = null;
      $('#delete-overlay').addClass('hidden');
      toast('Product deleted.');
      renderTable();
    });

    /* ── Event: Details close ── */
    $('#btn-close-details').on('click', hideDetails);

    /* ── Event: Search / filter ── */
    $('#search').on('input', () => { currentPage = 1; renderTable(); });
    $('#filter-location').on('change', () => { currentPage = 1; renderTable(); });

    /* ── Event: Pagination ── */
    $('#btn-prev').on('click', () => { currentPage--; renderTable(); });
    $('#btn-next').on('click', () => { currentPage++; renderTable(); });

    /* ── Initial render ── */
    renderTable();

    /* ── Seed demo data if empty ── */
    if (products.length === 0) {
      const demo = [
        { id: nextId++, name: 'Blue Widget',      description: 'Standard size blue widget',    quantity: 42, location: 'Warehouse A' },
        { id: nextId++, name: 'Red Sprocket',     description: 'Heavy-duty steel sprocket',    quantity: 8,  location: 'Warehouse B' },
        { id: nextId++, name: 'Copper Fitting',   description: 'Compression fitting 3/4 inch', quantity: 0,  location: 'Warehouse A' },
        { id: nextId++, name: 'Rubber Seal',      description: 'Heat-resistant rubber seal',   quantity: 3,  location: 'Storage C'   },
        { id: nextId++, name: 'Hex Bolt M8',      description: 'Stainless steel hex bolt M8',  quantity: 150, location: 'Warehouse A' },
        { id: nextId++, name: 'Cable Tie Pack',   description: '100-piece black nylon ties',   quantity: 25, location: 'Storage C'   },
        { id: nextId++, name: 'LED Strip 5m',     description: 'Warm white, 12V LED strip',    quantity: 12, location: 'Warehouse B' },
        { id: nextId++, name: 'Power Adapter 5V', description: 'USB-C 5V 3A adapter',          quantity: 2,  location: 'Storage C'   },
      ];
      products = demo;
      save();
      renderTable();
    }
  });
  </script>
</body>
</html>
